<!doctype html>
<html lang="uk">
  @@include('html/head.html', { "title": "Бухгалтер ФОП, бухгалтерське обслуговування ФОП" })
  <body>
    <div class="wrapper">
      <main class="content">
        @@include('html/header.html', {})
        <!--  -->
        <div class="main">
          <h1>Сайт на WordPress</h1>
        </div>

        <!-- МОДАЛЬНОЕ ОКНО -->
        <div class="modal" id="contact-modal">
          <div class="modal__overlay"></div>

          <div class="modal__content">
            <button class="modal__close" aria-label="Закрыть">&times;</button>

            <h3>Ваши контактные данные для связи</h3>
            <p>Если возник вопрос или вы хотите оставить отзыв</p>

            <form class="form-modal">
              <div class="form-group">
                <input type="text" id="text-modal" required placeholder=" " />
                <label for="text-modal">Ваше имя / Название компании</label>
              </div>

              <div class="form-group">
                <input type="tel" id="tel-modal" required placeholder=" " />
                <label for="tel-modal">Телефон</label>
              </div>

              <div class="form-group">
                <input type="email" id="email-modal" required placeholder=" " />
                <label for="email-modal">Ваш E-mail</label>
              </div>

              <div class="form-group">
                <textarea name="message" required placeholder=" "></textarea>
                <label>Сообщение</label>
              </div>

              <!-- honeypot -->
              <input type="text" name="honey" style="display: none" tabindex="-1" autocomplete="off" />

              <button id="sendBtn" type="submit">Отправить</button>
              <div id="status-message"></div>
            </form>
          </div>
        </div>
      </main>
      <!--  -->
      @@include('html/footer.html', {})
    </div>

    <script src="js/app.min.js"></script>
  </body>
</html>
